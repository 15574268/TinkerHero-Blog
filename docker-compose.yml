services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: blog_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blog_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: blog_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - blog_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch 搜索引擎（含 IK 中文分词插件）
  elasticsearch:
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    container_name: blog_elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    # 端口映射仅用于调试，内部服务通信不需要
    # ports:
    #   - "9201:9200"
    #   - "9301:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - blog_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Go 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blog_backend
    environment:
      TZ: Asia/Shanghai
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: blog
      DB_PORT: 5432
      REDIS_ADDR: redis:6379
      ES_URL: http://elasticsearch:9200
      ES_USER: ""
      ES_PASSWORD: ""
      FRONTEND_URL: http://localhost:3000
      CORS_ALLOW_ORIGINS: http://localhost:3200
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-must-be-at-least-32-chars}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: noreply@blog.com
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - blog_network
    volumes:
      - ./uploads:/root/uploads
    restart: unless-stopped

  # Next.js 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
        API_URL: http://backend:8080/api/v1
    container_name: blog_frontend
    environment:
      TZ: Asia/Shanghai
      API_URL: http://backend:8080/api/v1
    ports:
      - "3200:3000"
    depends_on:
      - backend
    networks:
      - blog_network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  blog_network:
    driver: bridge
