# ==========================================================
#  博客系统 - OpenResty / Nginx 反向代理配置
#  将此文件放到宿主机 OpenResty 的 conf.d 目录下
#  前端和后端以 Docker 容器运行，监听在 127.0.0.1
# ==========================================================

upstream blog_frontend {
    server 127.0.0.1:3000;
}

upstream blog_backend {
    server 127.0.0.1:8080;
}

# ---- HTTP → HTTPS 重定向 ----
server {
    listen 80;
    server_name blog.railx.cn;

    # Let's Encrypt / ACME 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS 主站 ----
server {
    listen 443 ssl http2;
    server_name blog.railx.cn;

    # SSL 证书（根据实际路径修改）
    ssl_certificate     /etc/letsencrypt/live/blog.railx.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.railx.cn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 上传文件大小限制
    client_max_body_size 50m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Next.js API Routes（比 /api/ 前缀更长，优先匹配）
    location /api/image-proxy {
        proxy_pass http://blog_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://blog_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # 上传的静态文件（由 OpenResty 直接提供，不经过后端）
    location /uploads/ {
        alias /path/to/blog/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;

        # 防盗链：只允许本站域名及空 Referer 访问
        # none    = 没有 Referer 头（直接访问、书签、RSS 阅读器等）
        # blocked = Referer 头被防火墙/代理抹去
        # server_names = 与 server_name 匹配的来源
        # 如有多个域名（如 www 和裸域），在 server_names 后追加即可
        valid_referers none blocked server_names blog.railx.cn *.blog.railx.cn;
        if ($invalid_referer) {
            return 403;
        }
    }

    # 前端 Next.js
    location / {
        proxy_pass http://blog_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
